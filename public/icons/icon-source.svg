    <rect x="46" y="-148" width="62" height="190" rx="16" fill="url(#barHi)"/>
    <path d="M-138 34 Q-20 -40 108 -168" fill="none" stroke="#2dd4bf" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
    <circle cx="108" cy="-168" r="14" fill="#2dd4bf"/>
  </g>
